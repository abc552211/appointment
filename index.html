<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業驗光預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 隱藏捲軸但可滑動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative pb-16">
        
        <header class="bg-blue-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-xl font-bold">大學眼鏡 / 驗光所</h1>
            <button onclick="toggleSection('querySection')" class="text-sm bg-blue-700 px-3 py-1 rounded-full border border-blue-400">查詢/取消</button>
        </header>

        <main id="bookingSection" class="p-4">
            
            <section class="mb-6">
                <h2 class="text-lg font-bold mb-3 border-l-4 border-blue-600 pl-2">專業驗光師團隊</h2>
                <div class="flex overflow-x-auto space-x-2 no-scrollbar mb-3" id="optometristTabs">
                    <button class="shrink-0 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium">王大明 驗光師</button>
                    <button class="shrink-0 bg-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium">李小華 驗光師</button>
                </div>
                <div class="bg-blue-50 p-4 rounded-xl flex gap-4 items-center">
                    <div class="w-16 h-16 bg-gray-300 rounded-full shrink-0"></div> <div>
                        <h3 class="font-bold text-blue-800">王大明 (國家認證)</h3>
                        <p class="text-xs text-gray-600 mt-1">專長：多焦鏡片、兒童近視控制</p>
                        <p class="text-xs text-blue-600 mt-1 italic">「為您量身打造清晰視界」</p>
                    </div>
                </div>
            </section>

            <hr class="my-6 border-gray-200">

            <section>
                <h2 class="text-lg font-bold mb-4 border-l-4 border-blue-600 pl-2">立即預約</h2>
                <form id="bookingForm" class="space-y-4">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">姓名</label>
                            <input type="text" id="custName" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">手機號碼</label>
                            <input type="tel" id="custPhone" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600 mb-1">推薦來源</label>
                        <select id="referral" class="w-full border rounded-lg p-2 bg-white outline-none">
                            <option value="">自行預約</option>
                            <option value="shop_A">特約咖啡廳-南灣店</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600 mb-2">諮詢項目 (可複選)</label>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <label class="flex items-center space-x-2"><input type="checkbox" value="視力檢查" class="rounded text-blue-600"> <span>視力檢查</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" value="配鏡諮詢" class="rounded text-blue-600"> <span>配鏡諮詢</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" value="隱形眼鏡" class="rounded text-blue-600"> <span>隱形眼鏡驗配</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" value="鏡架調整" class="rounded text-blue-600"> <span>鏡架調整</span></label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600 mb-1">指定驗光師</label>
                        <select id="optometristSelect" class="w-full border rounded-lg p-2 bg-white outline-none">
                            <option value="">不指定 (安排最快時段)</option>
                            <option value="1">王大明 驗光師</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">預約日期</label>
                            <input type="date" id="bookDate" required class="w-full border rounded-lg p-2 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">預約時段</label>
                            <select id="bookTime" required class="w-full border rounded-lg p-2 bg-white outline-none">
                                <option value="" disabled selected>請先選日期</option>
                                <option value="10:00">10:00 - 11:00</option>
                                <option value="14:00">14:00 - 15:00</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600 mb-1">備註留言</label>
                        <textarea id="notes" rows="2" class="w-full border rounded-lg p-2 outline-none"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md active:bg-blue-700">送出預約</button>
                </form>
            </section>
        </main>

        <main id="querySection" class="p-4 hidden bg-gray-100 min-h-screen">
            <h2 class="text-lg font-bold mb-4">查詢 / 取消預約</h2>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <label class="block text-sm text-gray-600 mb-2">請輸入預約時的電話號碼</label>
                <div class="flex gap-2">
                    <input type="tel" id="queryPhone" class="w-full border rounded-lg p-2 outline-none" placeholder="09XX-XXX-XXX">
                    <button onclick="searchAppointments()" class="bg-gray-800 text-white px-4 rounded-lg">查詢</button>
                </div>
            </div>
            
            <div id="resultCards" class="mt-4 space-y-3 hidden">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-red-100 relative">
                    <span class="absolute top-3 right-3 bg-green-100 text-green-700 text-xs px-2 py-1 rounded">已確認</span>
                    <p class="font-bold">2026-07-05 (日) 14:00</p>
                    <p class="text-sm text-gray-600 mt-1">驗光師：王大明</p>
                    <p class="text-sm text-gray-600">項目：視力檢查、配鏡諮詢</p>
                    <button class="mt-3 w-full border border-red-500 text-red-500 py-2 rounded-lg text-sm font-bold active:bg-red-50">取消此筆預約</button>
                </div>
            </div>
            <button onclick="toggleSection('bookingSection')" class="mt-6 w-full text-blue-600 text-sm py-2">返回預約首頁</button>
        </main>

        <footer class="absolute bottom-0 w-full p-4 text-center">
            <a href="/admin-login" class="text-[10px] text-gray-300 hover:text-gray-400">管理人員登入</a>
        </footer>

    </div>

    <script>
        // 1. 初始化 Supabase
        const SUPABASE_URL = 'https://xwyyptgrzwirygkvhfsr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nb8lbrKVTRuj4wRkTN66kg_Cy1nBNgz';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. 切換 預約/查詢 頁面
        function toggleSection(sectionId) {
            document.getElementById('bookingSection').classList.add('hidden');
            document.getElementById('querySection').classList.add('hidden');
            document.getElementById(sectionId).classList.remove('hidden');
        }

        // 3. 表單送出邏輯
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 取得輸入值 (此處為基礎取值範例，實際寫入需對應資料庫 UUID)
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            
            // 產生隨機預約單號
            const bookingNo = 'BK' + Math.floor(Math.random() * 100000);

            try {
                // 寫入 appointments 表
                const { data, error } = await supabase
                    .from('appointments')
                    .insert([
                        { 
                            booking_no: bookingNo,
                            customer_name: name,
                            customer_phone: phone,
                            appointment_date: date,
                            appointment_time: time + ':00',
                            status: 'pending'
                        }
                    ]);

                if (error) throw error;

                // 溫馨提示
                alert(`預約已送出！\n您的預約單號為：${bookingNo}\n我們將儘速安排專人與您聯繫。如欲取消，請至「查詢/取消」區塊辦理。`);
                document.getElementById('bookingForm').reset();

            } catch (err) {
                console.error('寫入失敗:', err);
                alert('預約失敗，請稍後再試。');
            }
        });

        // 4. 查詢預約邏輯 (示意)
        async function searchAppointments() {
            const phone = document.getElementById('queryPhone').value;
            if(!phone) {
                alert('請輸入電話號碼');
                return;
            }
            // 顯示結果區塊 (實務上應使用 Supabase fetch 資料並渲染)
            document.getElementById('resultCards').classList.remove('hidden');
        }
    </script>
</body>
</html>
