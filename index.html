<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業驗光預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl relative pb-20">
        
        <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
            <h1 class="text-lg font-bold tracking-wide" id="headerTitle">大學眼鏡 / 驗光所</h1>
            <button id="navBtn" onclick="toggleSection('querySection')" class="text-xs bg-white/20 hover:bg-white/30 backdrop-blur-sm px-4 py-1.5 rounded-full border border-white/30 transition-all cursor-pointer relative z-50">查詢/取消</button>
        </header>

        <div id="bookingSection" class="p-5 space-y-6 block">
            <section>
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3 flex items-center gap-2">
                    <span class="w-1 h-4 bg-blue-600 rounded-full"></span>專業驗光師團隊
                </h2>
                <div class="flex overflow-x-auto gap-2 no-scrollbar mb-3" id="optometristTabs"></div>
                
                <div class="bg-gradient-to-br from-blue-50 to-indigo-50/50 p-4 rounded-2xl border border-blue-100/50 flex gap-4 items-center min-h-[100px] shadow-sm">
                    <div class="w-14 h-14 bg-gradient-to-tr from-blue-400 to-indigo-400 rounded-full shrink-0 flex items-center justify-center text-white font-bold text-xl shadow-inner">師</div>
                    <div id="optProfileContent" class="space-y-1">
                        <h3 id="optName" class="font-bold text-slate-800 text-base">載入中...</h3>
                        <p id="optSpec" class="text-xs text-slate-600 leading-relaxed"></p>
                        <p id="optGreet" class="text-xs text-blue-600 font-medium italic"></p>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                    <span class="w-1 h-4 bg-blue-600 rounded-full"></span>立即填寫預約
                </h2>
                <form id="bookingForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">姓名</label>
                            <input type="text" id="custName" required class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">手機號碼</label>
                            <input type="tel" id="custPhone" required class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">推薦來源</label>
                        <select id="referral" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                            <option value="">自行預約 (無推薦)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-2">諮詢項目 (可複選)</label>
                        <div class="grid grid-cols-2 gap-2 text-sm" id="servicesContainer"></div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">指定驗光師</label>
                        <select id="optometristSelect" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                            <option value="">不指定 (安排最快時段)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">預約日期</label>
                            <input type="date" id="bookDate" required onchange="loadAvailableTimes()" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">預約時段</label>
                            <select id="bookTime" required class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                                <option value="" disabled selected>請先選擇日期</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">備註留言</label>
                        <textarea id="notes" rows="2" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all" placeholder="若有特殊需求請在此留言..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-md shadow-blue-200 active:scale-[0.99] transition-all mt-2 cursor-pointer">確認送出預約</button>
                </form>
            </section>
        </div>

        <div id="querySection" class="p-5 hidden space-y-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-3">
                <label class="block text-xs font-medium text-slate-500">請輸入預約時的手機號碼</label>
                <div class="flex gap-2">
                    <input type="tel" id="queryPhone" class="flex-1 border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-blue-500" placeholder="09XX-XXX-XXX">
                    <button onclick="searchAppointments()" class="bg-slate-900 text-white px-5 text-sm font-medium rounded-xl active:bg-slate-800 transition-all cursor-pointer">查詢</button>
                </div>
            </div>
            <div id="resultCards" class="space-y-3 hidden"></div>
            <button onclick="toggleSection('bookingSection')" class="w-full text-slate-500 text-xs py-3 text-center hover:text-slate-700 transition-all cursor-pointer">← 返回預約首頁</button>
        </div>

        <div id="adminSection" class="p-4 hidden space-y-4 bg-slate-50 min-h-[calc(100vh-100px)]">
            <div class="flex p-1 bg-slate-200/70 rounded-xl gap-1">
                <button id="tab-adminAppointments" onclick="switchAdminTab('adminAppointments')" class="flex-1 bg-white text-slate-800 py-2 rounded-lg text-xs font-bold shadow-sm transition-all cursor-pointer">預約一覽表</button>
                <button id="tab-adminSettings" onclick="switchAdminTab('adminSettings')" class="flex-1 text-slate-500 py-2 rounded-lg text-xs font-bold transition-all cursor-pointer">系統與班表設定</button>
            </div>

            <div id="adminAppointments" class="space-y-3 block">
                <div id="adminAppointmentCards" class="space-y-3">
                    <p class="text-xs text-slate-400 text-center py-8">讀取中...</p>
                </div>
            </div>

            <div id="adminSettings" class="space-y-4 hidden">
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm space-y-3">
                    <h3 class="font-bold text-xs text-indigo-600 uppercase tracking-wider">預約天數開放設定</h3>
                    <div class="flex gap-2 items-center text-sm text-slate-600">
                        <span>開放未來</span>
                        <input type="number" class="w-14 border border-slate-200 rounded-lg p-1.5 text-center text-sm outline-none focus:border-blue-500" value="3">
                        <span>至</span>
                        <input type="number" class="w-14 border border-slate-200 rounded-lg p-1.5 text-center text-sm outline-none focus:border-blue-500" value="30">
                        <span>天</span>
                    </div>
                    <button onclick="triggerAlert('系統提示', '設定已成功儲存！')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2 rounded-xl transition-all cursor-pointer">儲存設定</button>
                </div>
            </div>
            
            <button onclick="toggleSection('bookingSection')" class="w-full text-rose-600 text-xs py-3 border border-rose-100 rounded-xl bg-rose-50/50 hover:bg-rose-50 font-medium transition-all cursor-pointer">登出並返回前台</button>
        </div>

        <footer class="absolute bottom-0 left-0 w-full p-4 text-center border-t border-slate-100 bg-white z-40">
            <button onclick="openAdminLoginModal()" class="text-[11px] text-slate-300 hover:text-slate-400 transition-all tracking-wider cursor-pointer relative z-50 py-1 px-3">管理人員系統登入</button>
        </footer>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-base font-bold text-slate-800">管理人員系統登入</h3>
                <button onclick="closeAdminLoginModal()" class="text-slate-400 hover:text-slate-600 text-lg">✕</button>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">請輸入管理員密碼</label>
                <input type="password" id="adminPasswordInput" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-blue-500" placeholder="預設密碼為 1234">
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="closeAdminLoginModal()" class="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-xl text-sm font-medium hover:bg-slate-200 transition-all">取消</button>
                <button onclick="submitAdminLogin()" class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700 transition-all">確認登入</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl text-center space-y-4">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto text-xl font-bold">i</div>
            <h3 id="alertTitle" class="text-base font-bold text-slate-800">提示</h3>
            <p id="alertMessage" class="text-sm text-slate-600 whitespace-pre-line leading-relaxed"></p>
            <button onclick="closeAlertModal()" class="w-full bg-blue-600 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700 transition-all mt-2">確定</button>
        </div>
    </div>


    <script>
    const SUPABASE_URL = 'https://xwyyptgrzwirygkvhfsr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Nb8lbrKVTRuj4wRkTN66kg_Cy1nBNgz';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let optometristsData = [];
    let currentOptIndex = 0;

    document.addEventListener('DOMContentLoaded', async () => {
        await loadOptometrists();
        await loadReferrals();
        await loadServices();
    });

    // 呼叫客製化彈窗
    type="text/javascript"
    function triggerAlert(title, message) {
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = message;
        const modal = document.getElementById('alertModal');
        modal.style.display = 'flex';
    }

    function closeAlertModal() {
        document.getElementById('alertModal').style.display = 'none';
    }

    // 管理員登入彈窗控制
    function openAdminLoginModal() {
        document.getElementById('adminPasswordInput').value = '';
        document.getElementById('loginModal').style.display = 'flex';
        document.getElementById('adminPasswordInput').focus();
    }

    function closeAdminLoginModal() {
        document.getElementById('loginModal').style.display = 'none';
    }

    function submitAdminLogin() {
        const password = document.getElementById('adminPasswordInput').value;
        if (password === '1234') {
            closeAdminLoginModal();
            toggleSection('adminSection');
            loadAdminAppointments();
        } else {
            triggerAlert('登入失敗', '密碼錯誤，請重新輸入！');
        }
    }

    async function loadOptometrists() {
        const { data } = await supabase.from('optometrists').select('*').eq('is_active', true);
        if (!data) return;
        optometristsData = data;
        renderOptometristTabs();
        
        const selectContainer = document.getElementById('optometristSelect');
        selectContainer.innerHTML = '<option value="">不指定 (安排最快時段)</option>';
        data.forEach(opt => {
            selectContainer.innerHTML += `<option value="${opt.id}">${opt.name}</option>`;
        });
        if(data.length > 0) showOptProfile(0);
    }

    function renderOptometristTabs() {
        const tabsContainer = document.getElementById('optometristTabs');
        if(!tabsContainer) return;
        tabsContainer.innerHTML = '';
        optometristsData.forEach((opt, index) => {
            const isActive = index === currentOptIndex;
            const btnClass = isActive 
                ? 'bg-blue-600 text-white shadow-md shadow-blue-100' 
                : 'bg-slate-100 text-slate-600 hover:bg-slate-200';
            tabsContainer.innerHTML += `<button onclick="showOptProfile(${index})" type="button" class="shrink-0 px-4 py-2 rounded-xl text-xs font-bold transition-all cursor-pointer ${btnClass}">${opt.name} 驗光師</button>`;
        });
    }

    function showOptProfile(index) {
        currentOptIndex = index;
        renderOptometristTabs();
        const opt = optometristsData[index];
        if(!opt) return;
        document.getElementById('optName').innerText = `${opt.name} ${opt.license ? '('+opt.license+')' : ''}`;
        
        let specialtiesText = '專長：未提供';
        if (opt.specialties && Array.isArray(opt.specialties)) specialtiesText = `專長：${opt.specialties.join('、')}`;
        else if (typeof opt.specialties === 'string') specialtiesText = `專長：${opt.specialties.replace(/[{}"\[\]]/g, '').split(',').join('、')}`;
        
        document.getElementById('optSpec').innerText = specialtiesText;
        document.getElementById('optGreet').innerText = opt.greeting ? `「${opt.greeting}」` : '';
    }

    async function loadReferrals() {
        const { data } = await supabase.from('referral_sources').select('*').eq('is_active', true);
        if (!data) return;
        const select = document.getElementById('referral');
        data.forEach(ref => select.innerHTML += `<option value="${ref.id}">${ref.name}</option>`);
    }

    async function loadServices() {
        const { data } = await supabase.from('services').select('*').eq('is_active', true);
        if (!data) return;
        const container = document.getElementById('servicesContainer');
        container.innerHTML = '';
        data.forEach(srv => {
            container.innerHTML += `
                <label class="flex items-center gap-2 p-2.5 rounded-xl border border-slate-100 hover:bg-slate-50 cursor-pointer transition-all select-none">
                    <input type="checkbox" value="${srv.id}" class="rounded text-blue-600 focus:ring-blue-100 w-4 h-4 border-slate-300"> 
                    <span class="text-xs font-medium text-slate-700">${srv.name}</span>
                </label>`;
        });
    }

    function loadAvailableTimes() {
        const dateVal = document.getElementById('bookDate').value;
        const timeSelect = document.getElementById('bookTime');
        if(!dateVal) {
            timeSelect.innerHTML = '<option value="" disabled selected>請先選擇日期</option>';
            return;
        }
        timeSelect.innerHTML = '<option value="" disabled selected>請選擇時段</option>';
        const mockTimes = ['10:00', '11:00', '14:00', '15:00', '19:00', '20:00'];
        mockTimes.forEach(t => timeSelect.innerHTML += `<option value="${t}">${t}</option>`);
    }

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const bookingNo = 'BK' + Math.floor(Math.random() * 90000 + 10000);
        const optId = document.getElementById('optometristSelect').value;
        const refId = document.getElementById('referral').value;
        const selectedServices = Array.from(document.querySelectorAll('#servicesContainer input[type="checkbox"]:checked')).map(cb => cb.value);

        try {
            const { error } = await supabase.from('appointments').insert([{ 
                booking_no: bookingNo,
                customer_name: document.getElementById('custName').value,
                customer_phone: document.getElementById('custPhone').value,
                appointment_date: document.getElementById('bookDate').value,
                appointment_time: document.getElementById('bookTime').value + ':00',
                optometrist_id: optId ? optId : null,
                referral_source_id: refId ? refId : null,
                selected_services: selectedServices, 
                notes: document.getElementById('notes').value
            }]);
            if (error) throw error;
            triggerAlert('預約成功！', `您的預約單號為：${bookingNo}\n請牢記此單號以便日後查詢。`);
            document.getElementById('bookingForm').reset();
            document.getElementById('bookTime').innerHTML = '<option value="" disabled selected>請先選擇日期</option>';
            showOptProfile(0);
        } catch (err) {
            triggerAlert('預約失敗', '預約失敗，請檢查網路連線或稍後再試。');
        }
    });

    async function searchAppointments() {
        const phone = document.getElementById('queryPhone').value;
        if(!phone) return triggerAlert('欄位未填', '請輸入電話號碼');
        
        const { data, error } = await supabase.from('appointments').select('*, optometrists(name)').eq('customer_phone', phone).eq('status', 'pending');
        const resultContainer = document.getElementById('resultCards');
        resultContainer.innerHTML = ''; 
        if (error || !data || data.length === 0) {
            resultContainer.classList.add('hidden');
            return triggerAlert('查無紀錄', '查無尚未赴約的預約紀錄。');
        }
        resultContainer.classList.remove('hidden');
        data.forEach(app => {
            const optName = app.optometrists ? app.optometrists.name : '不指定';
            resultContainer.innerHTML += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 relative space-y-2">
                    <span class="absolute top-4 right-4 bg-emerald-50 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded-full">已預約</span>
                    <p class="font-bold text-base text-slate-800">${app.appointment_date} <span class="text-blue-600 ml-1">${app.appointment_time.substring(0,5)}</span></p>
                    <div class="text-xs text-slate-500 space-y-0.5">
                        <p>單號：<span class="font-mono">${app.booking_no}</span></p>
                        <p>驗光師：${optName}</p>
                    </div>
                    <button onclick="cancelAppointment('${app.id}')" type="button" class="mt-2 w-full border border-rose-200 text-rose-600 hover:bg-rose-50 py-2 rounded-xl text-xs font-bold transition-all cursor-pointer">取消此筆預約</button>
                </div>
            `;
        });
    }

    async function cancelAppointment(appId) {
        if(!confirm('您確定要取消這筆預約嗎？')) return;
        const { error } = await supabase.from('appointments').update({ status: 'cancelled' }).eq('id', appId);
        if(!error) { triggerAlert('取消成功', '您的預約已成功取消。'); searchAppointments(); }
    }

    function toggleSection(sectionId) {
        ['bookingSection', 'querySection', 'adminSection'].forEach(id => {
            const section = document.getElementById(id);
            section.style.display = 'none';
        });
        
        const targetSection = document.getElementById(sectionId);
        targetSection.style.display = 'block';
        
        const navBtn = document.getElementById('navBtn');
        const headerTitle = document.getElementById('headerTitle');
        if (sectionId === 'bookingSection') {
            headerTitle.innerText = '大學眼鏡 / 驗光所';
            navBtn.innerText = '查詢/取消';
            navBtn.setAttribute('onclick', "toggleSection('querySection')");
            navBtn.style.display = 'block';
        } else if (sectionId === 'querySection') {
            headerTitle.innerText = '查詢預約';
            navBtn.innerText = '回首頁';
            navBtn.setAttribute('onclick', "toggleSection('bookingSection')");
            navBtn.style.display = 'block';
        } else if (sectionId === 'adminSection') {
            headerTitle.innerText = '後台管理系統';
            navBtn.style.display = 'none';
        }
        window.scrollTo(0,0);
    }

    function switchAdminTab(tabId) {
        const tabs = ['adminAppointments', 'adminSettings'];
        tabs.forEach(t => {
            const block = document.getElementById(t);
            const btn = document.getElementById('tab-' + t);
            if(t === tabId) {
                block.style.display = 'block';
                if(btn) btn.className = "flex-1 bg-white text-slate-800 py-2 rounded-lg text-xs font-bold shadow-sm transition-all cursor-pointer";
            } else {
                block.style.display = 'none';
                if(btn) btn.className = "flex-1 text-slate-500 py-2 rounded-lg text-xs font-bold transition-all cursor-pointer";
            }
        });
    }

    async function loadAdminAppointments() {
        const container = document.getElementById('adminAppointmentCards');
        container.innerHTML = '<p class="text-xs text-slate-400 text-center py-8">讀取中...</p>';
        
        const { data, error } = await supabase
            .from('appointments')
            .select('*, optometrists(name), referral_sources(name)')
            .order('appointment_date', { ascending: false });

        if (error || !data) {
            container.innerHTML = '<p class="text-xs text-rose-500 text-center py-8">資料讀取失敗</p>';
            return;
        }

        if(data.length === 0) {
            container.innerHTML = '<p class="text-xs text-slate-400 text-center py-8">目前暫無預約紀錄</p>';
            return;
        }

        container.innerHTML = '';
        data.forEach(app => {
            const optName = app.optometrists ? app.optometrists.name : '不指定';
            const refName = app.referral_sources ? app.referral_sources.name : '無';
            
            const statusOptions = `
                <option value="pending" ${app.status==='pending'?'selected':''}>未處理/已預約</option>
                <option value="attended" ${app.status==='attended'?'selected':''}>赴約</option>
                <option value="completed_sale" ${app.status==='completed_sale'?'selected':''}>成功配鏡(締結)</option>
                <option value="noshow" ${app.status==='noshow'?'selected':''}>爽約</option>
                <option value="cancelled" ${app.status==='cancelled'?'selected':''}>取消</option>
            `;

            container.innerHTML += `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm space-y-2">
                    <div class="flex justify-between items-center">
                        <p class="font-bold text-sm text-slate-800">${app.appointment_date} <span class="text-blue-600">${app.appointment_time.substring(0,5)}</span></p>
                        <select onchange="updateAdminStatus('${app.id}', this.value)" class="text-xs border border-slate-200 rounded-lg p-1 bg-slate-50 font-medium focus:ring-2 focus:ring-blue-100 outline-none">
                            ${statusOptions}
                        </select>
                    </div>
                    <div class="text-xs text-slate-600 space-y-0.5">
                        <p class="font-bold text-slate-800 text-sm">${app.customer_name} <a href="tel:${app.customer_phone}" class="text-blue-500 font-normal underline ml-1">${app.customer_phone}</a></p>
                        <p>驗光師：<span class="text-slate-800">${optName}</span> | 來源：<span class="text-slate-800">${refName}</span></p>
                    </div>
                    ${app.notes ? `<div class="text-xs bg-amber-50/70 border border-amber-100/50 p-2 rounded-xl text-amber-800">備註: ${app.notes}</div>` : ''}
                </div>
            `;
        });
    }

    async function updateAdminStatus(appId, newStatus) {
        const { error } = await supabase.from('appointments').update({ status: newStatus }).eq('id', appId);
        if (error) triggerAlert('提示', '狀態更新失敗');
    }
    </script>
</body>
</html>
