<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業驗光預約系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-bg-warm: #fdfbf7;
        }
        body {
            background-color: var(--color-bg-warm);
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col justify-between">

    <main id="frontend-view" class="max-w-md mx-auto px-4 py-6 w-full space-y-6">
        
        <header class="text-center space-y-1 py-2">
            <h1 class="text-2xl font-bold text-teal-800 tracking-wide">專業驗光預約服務</h1>
            <p class="text-amber-800 text-xs font-medium">守護您的靈魂之窗 ‧ 提供溫馨客製化體驗</p>
        </header>

        <section class="bg-white rounded-xl shadow-xs border border-stone-200 overflow-hidden">
            <div id="intro-tabs" class="flex overflow-x-auto bg-stone-100 border-b border-stone-200 scrollbar-none"></div>
            <div id="intro-content" class="p-4 text-sm leading-relaxed">
                <div class="text-center py-4 text-stone-400 text-xs"><i class="fa-solid fa-spinner fa-spin mr-1"></i>資料讀取中...</div>
            </div>
        </section>

        <section class="bg-white p-5 rounded-xl shadow-xs border border-stone-200 space-y-4">
            <h2 class="text-lg font-bold text-slate-800 flex items-center border-b pb-2 border-stone-100">
                <i class="fa-solid fa-calendar-check text-teal-600 mr-2"></i>線上預約掛號
            </h2>
            
            <form id="booking-form" onsubmit="handleBooking(event)" class="space-y-3.5">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">真實姓名 *</label>
                    <input type="text" id="cust-name" required class="w-full px-3 py-2.5 text-sm rounded-lg border border-stone-300 focus:outline-none focus:border-teal-500 bg-stone-50/50" placeholder="請輸入姓名">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">手機號碼 *</label>
                    <input type="tel" id="cust-phone" required pattern="[0-9]{10}" class="w-full px-3 py-2.5 text-sm rounded-lg border border-stone-300 focus:outline-none focus:border-teal-500 bg-stone-50/50" placeholder="例：0912345678">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">推薦來源商號 *</label>
                    <select id="booking-partner" required class="w-full px-3 py-2.5 text-sm rounded-lg border border-stone-300 bg-white focus:outline-none focus:border-teal-500"></select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">指定驗光人員</label>
                    <select id="booking-optometrist" onchange="updateAvailableSlots()" class="w-full px-3 py-2.5 text-sm rounded-lg border border-stone-300 bg-white focus:outline-none focus:border-teal-500">
                        <option value="不指定">不指定（由系統統籌）</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">諮詢項目 (可複選) *</label>
                    <div id="booking-services" class="grid grid-cols-1 gap-1.5 bg-stone-50 p-2.5 rounded-lg border border-stone-200 max-h-36 overflow-y-auto"></div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">預約日期 *</label>
                        <input type="date" id="booking-date" required onchange="updateAvailableSlots()" class="w-full px-3 py-2 text-sm rounded-lg border border-stone-300 bg-white focus:outline-none focus:border-teal-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">預約時間時段 *</label>
                        <select id="booking-time" required class="w-full px-3 py-2 text-sm rounded-lg border border-stone-300 bg-white focus:outline-none focus:border-teal-500">
                            <option value="">請先選擇日期</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">備註說明</label>
                    <input type="text" id="cust-notes" class="w-full px-3 py-2.5 text-sm rounded-lg border border-stone-300 focus:outline-none focus:border-teal-500 bg-stone-50/50" placeholder="如有其他需求請註記於此">
                </div>

                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-3 rounded-lg text-sm shadow-xs transition-colors cursor-pointer mt-2">
                    確認送出預約
                </button>
            </form>

            <div class="text-center pt-2">
                <button onclick="toggleModal('cancel-modal', true)" class="text-xs text-stone-400 hover:text-teal-600 underline cursor-pointer">
                    查詢預約 / 取消預約申請
                </button>
            </div>
        </section>
    </main>

    <main id="backend-view" class="hidden max-w-lg mx-auto px-3 py-4 w-full space-y-6">
        <header class="flex justify-between items-center border-b pb-3 border-stone-200">
            <div>
                <h1 class="text-xl font-bold text-slate-800">維護管理後台</h1>
                <p class="text-xs text-slate-400">系統配置與預約狀態審查</p>
            </div>
            <button onclick="logoutBackend()" class="px-3 py-1 bg-stone-200 text-slate-700 rounded text-xs cursor-pointer">登出</button>
        </header>

        <section class="bg-white p-4 rounded-xl border border-stone-200 space-y-4">
            <h2 class="text-sm font-bold text-slate-700 border-b pb-1.5 flex items-center"><i class="fa-solid fa-user-clock mr-1.5 text-teal-600"></i>驗光師專屬班表與排班</h2>
            <div class="space-y-2 text-xs">
                <div>
                    <label class="block font-medium text-slate-600 mb-0.5">選擇設定人員</label>
                    <select id="cfg-sched-optometrist" onchange="renderScheduleSettings()" class="w-full p-2 border rounded bg-white"></select>
                </div>
                <div>
                    <label class="block font-medium text-slate-600 mb-1">排班配置 (打勾代表該日上班)</label>
                    <div id="cfg-schedule-days" class="space-y-2 max-h-48 overflow-y-auto bg-stone-50 p-2 rounded border"></div>
                </div>
                <button onclick="saveScheduleSettings()" class="w-full bg-teal-600 text-white py-2 rounded font-medium text-xs cursor-pointer">更新此人員班表</button>
            </div>
        </section>

        <section class="bg-white p-4 rounded-xl border border-stone-200 space-y-3 text-xs">
            <h2 class="text-sm font-bold text-slate-700 border-b pb-1.5"><i class="fa-solid fa-sliders mr-1.5 text-teal-600"></i>基本配置</h2>
            <div class="flex items-center space-x-2">
                <span>開放天數：未來</span>
                <input type="number" id="cfg-start-day" value="3" class="w-12 p-1 border rounded text-center">
                <span>天至</span>
                <input type="number" id="cfg-end-day" value="30" class="w-12 p-1 border rounded text-center">
            </div>
            <div>
                <label class="block mb-0.5">通知信箱 (Mail)</label>
                <input type="email" id="cfg-email" value="service@eyecenter.com" class="w-full p-2 border rounded">
            </div>
            <button onclick="saveGeneralSettings()" class="w-full bg-stone-800 text-white py-2 rounded font-medium cursor-pointer">儲存基礎設定</button>
        </section>

        <section class="bg-white p-4 rounded-xl border border-stone-200 space-y-3">
            <h2 class="text-sm font-bold text-slate-700 border-b pb-1.5"><i class="fa-solid fa-list text-teal-600 mr-1.5"></i>預約客戶名單狀態</h2>
            <div id="backend-appointments-list" class="space-y-2.5 max-h-72 overflow-y-auto pr-1"></div>
        </section>
    </main>

    <div id="cancel-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-xl p-5 space-y-4 shadow-xl">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-bold text-slate-800">查詢預約狀態</h3>
                <button onclick="toggleModal('cancel-modal', false)" class="text-stone-400 text-lg cursor-pointer">&times;</button>
            </div>
            <div class="space-y-2">
                <label class="block text-xs font-semibold text-slate-600">輸入預約手機號碼</label>
                <div class="flex space-x-2">
                    <input type="tel" id="query-phone" placeholder="0912345678" class="flex-1 px-3 py-2 text-sm border rounded-lg focus:outline-none">
                    <button onclick="searchAppointments()" class="bg-teal-600 text-white px-4 py-2 text-sm rounded-lg font-medium cursor-pointer">查詢</button>
                </div>
            </div>
            <div id="query-results" class="space-y-2 max-h-48 overflow-y-auto text-xs text-slate-600"></div>
        </div>
    </div>

    <footer class="bg-stone-100 border-t border-stone-200 py-3 px-4 flex justify-between items-center text-[10px] text-stone-400">
        <div>© 2026 專業驗光所預約系統.</div>
        <button onclick="openLoginPrompt()" class="text-stone-300 hover:text-stone-500 cursor-pointer"><i class="fa-solid fa-gear"></i> 管理維護</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://xwyyptgrzwirygkvhfsr.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Nb8lbrKVTRuj4wRkTN66kg_Cy1nBNgz";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 初始化全域儲存變數
        let db = {
            clinic_info: { name: "大學眼鏡聯合驗光所", title: "載入中...", content: "正在同步雲端資料庫..." },
            optometrists: [],
            partners: [],
            services: [],
            schedules: [],
            appointments: [],
            config: { start_day: 3, end_day: 30, email: "service@eyecenter.com" },
            password: "admin"
        };

        window.onload = async function() {
            await syncWithSupabase();
            initDateLimit();
        };

        // 🔗 核心功能：全面同步讀取 Supabase 的真實資料
        async function syncWithSupabase() {
            try {
                // 1. 讀取品牌與驗光師
                let { data: opts, error: err1 } = await supabase.from('optometrists').select('*');
                if (!err1 && opts) {
                    const brandData = opts.find(o => o.is_brand === true);
                    if(brandData) db.clinic_info = { name: brandData.name, title: brandData.greeting, content: brandData.specialties ? brandData.specialties.join('\n') : '' };
                    db.optometrists = opts.filter(o => o.is_brand !== true);
                }

                // 2. 讀取推薦商家
                let { data: pts, error: err2 } = await supabase.from('partners').select('*');
                if (!err2 && pts) db.partners = pts.map(p => p.store_name);

                // 3. 讀取服務項目
                let { data: svs, error: err3 } = await supabase.from('services').select('*');
                if (!err3 && svs) db.services = svs.map(s => ({ name: s.service_name, duration: s.duration_minutes }));

                // 4. 讀取班表設定
                let { data: schs, error: err4 } = await supabase.from('schedules').select('*');
                if (!err4 && schs) db.schedules = schs.map(s => ({ opt_id: s.optometrist_id, day: s.day_of_week, slot: s.time_slot, max: s.max_pax }));

                // 5. 讀取所有預約紀錄
                let { data: apps, error: err5 } = await supabase.from('appointments').select('*').order('created_at', { ascending: false });
                if (!err5 && apps) db.appointments = apps.map(a => ({ id: a.id, name: a.customer_name, phone: a.customer_phone, partner: a.partner_name, optometrist: a.optometrist_name, date: a.booking_date, time: a.booking_time, services: a.services, notes: a.notes, status: a.status }));

                // 刷新渲染畫面
                renderFrontend();
                renderBackend();
            } catch (e) {
                console.error("同步失敗:", e);
            }
        }

        function initDateLimit() {
            const today = new Date();
            const minDate = new Date(today.getTime() + db.config.start_day * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const maxDate = new Date(today.getTime() + db.config.end_day * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            document.getElementById('booking-date').min = minDate;
            document.getElementById('booking-date').max = maxDate;
        }

        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
            if(!show) document.getElementById('query-results').innerHTML = '';
        }

        // ================= 前台排版與動態下拉時段邏輯 =================
        function renderFrontend() {
            const tabs = document.getElementById('intro-tabs');
            tabs.innerHTML = `<button onclick="switchTab('brand')" id="btn-tab-brand" class="tab-btn px-4 py-2.5 text-xs font-semibold shrink-0 border-b-2 border-teal-600 text-teal-700 bg-white">${db.clinic_info.name}</button>`;
            db.optometrists.forEach(o => {
                tabs.innerHTML += `<button onclick="switchTab(${o.id})" id="btn-tab-${o.id}" class="tab-btn px-4 py-2.5 text-xs font-semibold shrink-0 text-stone-500">${o.name}</button>`;
            });
            switchTab('brand');

            const pSel = document.getElementById('booking-partner');
            pSel.innerHTML = '<option value="">請選擇推薦合作店家</option>';
            db.partners.forEach(p => pSel.innerHTML += `<option value="${p}">${p}</option>`);

            const oSel = document.getElementById('booking-optometrist');
            oSel.innerHTML = '<option value="不指定">不指定（由系統統籌）</option>';
            db.optometrists.forEach(o => oSel.innerHTML += `<option value="${o.name}">${o.name}</option>`);

            const sDiv = document.getElementById('booking-services');
            sDiv.innerHTML = '';
            db.services.forEach(s => {
                sDiv.innerHTML += `
                    <label class="flex items-center space-x-2 text-xs p-1 text-slate-700 cursor-pointer">
                        <input type="checkbox" name="f-serv" value="${s.name}" class="text-teal-600 rounded">
                        <span>${s.name} (${s.duration}分)</span>
                    </label>
                `;
            });
        }

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('border-b-2', 'border-teal-600', 'text-teal-700', 'bg-white'));
            const content = document.getElementById('intro-content');
            
            if(type === 'brand') {
                document.getElementById('btn-tab-brand').classList.add('border-b-2', 'border-teal-600', 'text-teal-700', 'bg-white');
                content.innerHTML = `<h3 class="font-bold text-teal-900 mb-1">${db.clinic_info.title}</h3><p class="text-stone-600 whitespace-pre-line">${db.clinic_info.content}</p>`;
            } else {
                document.getElementById(`btn-tab-${type}`).classList.add('border-b-2', 'border-teal-600', 'text-teal-700', 'bg-white');
                const o = db.optometrists.find(x => x.id === type);
                content.innerHTML = `
                    <div class="space-y-1.5">
                        <div class="font-bold text-slate-800">${o.name} <span class="text-[10px] font-normal bg-stone-100 text-stone-600 px-1.5 py-0.5 rounded ml-1">${o.licenses ? o.licenses.join(',') : ''}</span></div>
                        <div class="text-xs text-teal-700">專長：${o.specialties ? o.specialties.join(', ') : ''}</div>
                        <div class="text-xs italic bg-amber-50 p-2 border-l-2 border-amber-400 text-amber-900">"${o.greeting || ''}"</div>
                    </div>
                `;
            }
        }

        function updateAvailableSlots() {
            const dateVal = document.getElementById('booking-date').value;
            const optVal = document.getElementById('booking-optometrist').value;
            const timeSel = document.getElementById('booking-time');
            
            if(!dateVal) {
                timeSel.innerHTML = '<option value="">請先選擇日期</option>';
                return;
            }

            const chosenDate = new Date(dateVal);
            const dayOfWeek = chosenDate.getDay();

            let activeOptIds = [];
            if(optVal === "不指定") {
                activeOptIds = db.optometrists.map(o => o.id);
            } else {
                const found = db.optometrists.find(o => o.name === optVal);
                if(found) activeOptIds.push(found.id);
            }

            let matchedSlots = db.schedules.filter(s => s.day === dayOfWeek && activeOptIds.includes(s.opt_id));
            
            timeSel.innerHTML = '';
            if(matchedSlots.length === 0) {
                timeSel.innerHTML = '<option value="">當日無可預約時段</option>';
                return;
            }

            let distinctSlots = [...new Set(matchedSlots.map(s => s.slot))].sort();
            
            timeSel.innerHTML = '<option value="">-- 請選擇時間 --</option>';
            distinctSlots.forEach(slot => {
                const bookedCount = db.appointments.filter(a => a.date === dateVal && a.time === slot && a.status !== '取消').length;
                const maxAllowed = matchedSlots.filter(s => s.slot === slot).reduce((acc, curr) => acc + curr.max, 0);

                if(bookedCount < maxAllowed) {
                    timeSel.innerHTML += `<option value="${slot}">${slot} (餘 ${maxAllowed - bookedCount} 名額)</option>`;
                } else {
                    timeSel.innerHTML += `<option value="" disabled>${slot} (已額滿)</option>`;
                }
            });
        }

        // 🔗 寫入功能：送出預約存入 Supabase
        async function handleBooking(e) {
            e.preventDefault();
            const servs = [];
            document.querySelectorAll('input[name="f-serv"]:checked').forEach(cb => servs.push(cb.value));
            if(servs.length === 0) { alert("請至少勾選一個項目"); return; }

            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const partner = document.getElementById('booking-partner').value;
            const opt = document.getElementById('booking-optometrist').value;
            const date = document.getElementById('booking-date').value;
            const time = document.getElementById('booking-time').value;
            const notes = document.getElementById('cust-notes').value || "無";

            const { data, error } = await supabase.from('appointments').insert([
                {
                    customer_name: name,
                    customer_phone: phone,
                    partner_name: partner,
                    optometrist_name: opt,
                    booking_date: date,
                    booking_time: time,
                    services: servs,
                    notes: notes,
                    status: "待聯繫"
                }
            ]).select();

            if (error) {
                alert("預約失敗，請檢查資料庫連線或重試");
                console.error(error);
            } else {
                alert("預約已送出，我們將儘速安排專人與您電話聯繫確認。如欲取消預約，請點選下方連結辦理。");
                document.getElementById('booking-form').reset();
                await syncWithSupabase();
            }
        }

        // ================= 隱蔽式查詢與取消機制 =================
        async function searchAppointments() {
            const phone = document.getElementById('query-phone').value.trim();
            const resDiv = document.getElementById('query-results');
            resDiv.innerHTML = '<p class="text-center py-2 text-stone-400">查詢中...</p>';

            if(!phone) { alert("請輸入電話"); return; }
            
            // RLS 安全查詢：依輸入電話向 Supabase 撈取
            let { data: list, error } = await supabase.from('appointments').select('*').eq('customer_phone', phone).order('booking_date', {ascending: false});
            resDiv.innerHTML = '';

            if(error || !list || list.length === 0) {
                resDiv.innerHTML = '<p class="text-stone-400 py-2 text-center">查無預約明細紀錄</p>';
                return;
            }

            list.forEach(a => {
                let cancelBtn = a.status === '待聯繫' 
                    ? `<button onclick="cancelApp(${a.id})" class="mt-2 w-full bg-rose-600 text-white text-xs py-1.5 rounded font-medium cursor-pointer">確認取消此筆預約</button>` 
                    : '';
                
                resDiv.innerHTML += `
                    <div class="bg-stone-50 p-2.5 rounded border border-stone-200 space-y-1 mb-2">
                        <div class="flex justify-between font-bold"><span>${a.booking_date} ${a.booking_time}</span><span class="text-teal-700">${a.status}</span></div>
                        <div class="text-[11px] text-stone-500">項目：${a.services ? a.services.join(',') : ''}</div>
                        <div class="text-[11px] text-stone-500">人員：${a.optometrist_name}</div>
                        ${cancelBtn}
                    </div>
                `;
            });
        }

        // 🔗 修改功能：取消預約
        async function cancelApp(id) {
            if(confirm("確定要取消這筆預約申請嗎？")) {
                const { error } = await supabase.from('appointments').update({ status: '取消' }).eq('id', id);
                if (!error) {
                    alert("預約已取消成功");
                    await syncWithSupabase();
                    searchAppointments();
                } else {
                    alert("取消失敗，請稍後再試");
                }
            }
        }

        // ================= 後台管理維護邏輯 =================
        function openLoginPrompt() {
            const pwd = prompt("維護密碼：");
            if(pwd === db.password) {
                document.getElementById('frontend-view').classList.add('hidden');
                document.getElementById('backend-view').classList.remove('hidden');
                renderBackend();
            } else if(pwd !== null) { alert("密碼錯誤"); }
        }

        function logoutBackend() {
            document.getElementById('backend-view').classList.add('hidden');
            document.getElementById('frontend-view').classList.remove('hidden');
        }

        function renderBackend() {
            const oSel = document.getElementById('cfg-sched-optometrist');
            if(oSel.options.length === 0) {
                db.optometrists.forEach(o => oSel.innerHTML += `<option value="${o.id}">${o.name}</option>`);
            }
            
            renderScheduleSettings();

            const listDiv = document.getElementById('backend-appointments-list');
            listDiv.innerHTML = '';
            db.appointments.forEach(a => {
                listDiv.innerHTML += `
                    <div class="p-3 bg-stone-50 rounded-lg border text-xs space-y-1.5 shadow-2xs">
                        <div class="flex justify-between items-center"><span class="font-bold text-slate-800">${a.name} (${a.phone})</span><span class="px-1.5 py-0.5 bg-teal-50 text-teal-800 rounded font-medium">${a.status}</span></div>
                        <div class="text-stone-500">時間：${a.date} 於 ${a.time}</div>
                        <div class="text-stone-500">來源：${a.partner} | 指定：${a.optometrist}</div>
                        <div class="flex gap-1 pt-1">
                            <button onclick="updateStatus(${a.id},'赴約')" class="flex-1 bg-white border border-blue-300 py-1 rounded text-blue-700 cursor-pointer">赴約</button>
                            <button onclick="updateStatus(${a.id},'締結')" class="flex-1 bg-teal-700 py-1 rounded text-white cursor-pointer">締結</button>
                            <button onclick="updateStatus(${a.id},'爽約')" class="flex-1 bg-white border border-rose-300 py-1 rounded text-rose-700">爽約</button>
                            <button onclick="updateStatus(${a.id},'取消')" class="flex-1 bg-stone-200 py-1 rounded text-stone-600 cursor-pointer">取消</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderScheduleSettings() {
            const oSel = document.getElementById('cfg-sched-optometrist');
            if(!oSel.value) return;
            const optId = parseInt(oSel.value);
            const daysDiv = document.getElementById('cfg-schedule-days');
            daysDiv.innerHTML = '';
            
            const dayNames = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
            const defaultTimes = ["09:00", "10:00", "11:00", "14:00", "15:00", "16:00"];

            for(let d=0; d<7; d++) {
                let daySlots = db.schedules.filter(s => s.opt_id === optId && s.day === d);
                let checked = daySlots.length > 0 ? "checked" : "";
                
                let slotsHtml = defaultTimes.map(t => {
                    let matchedSlot = daySlots.find(s => s.slot === t);
                    let slotChecked = matchedSlot ? "checked" : "";
                    let maxVal = matchedSlot ? matchedSlot.max : 1;
                    return `
                        <div class="flex items-center space-x-1 bg-white p-1 rounded border border-stone-100">
                            <input type="checkbox" data-time="${t}" ${slotChecked} class="rounded text-teal-600">
                            <span>${t}</span>
                            <input type="number" data-max="${t}" value="${maxVal}" class="w-8 border text-center rounded ml-auto">人
                        </div>
                    `;
                }).join('');

                daysDiv.innerHTML += `
                    <div class="p-2 border-b border-stone-200 last:border-0 space-y-1.5" data-day="${d}">
                        <label class="flex items-center space-x-2 font-bold text-teal-900">
                            <input type="checkbox" class="day-master-check" ${checked} onchange="this.parentElement.nextElementSibling.classList.toggle('hidden', !this.checked)">
                            <span>${dayNames[d]} 上班</span>
                        </label>
                        <div class="grid grid-cols-2 gap-1.5 pl-4 ${daySlots.length > 0 ? '' : 'hidden'}">
                            ${slotsHtml}
                        </div>
                    </div>
                `;
            }
        }

        // 🔗 班表更新：同部覆蓋至 Supabase
        async function saveScheduleSettings() {
            const optId = parseInt(document.getElementById('cfg-sched-optometrist').value);
            
            // 1. 刪除該員舊排班
            await supabase.from('schedules').delete().eq('optometrist_id', optId);

            // 2. 蒐集勾選的新排班
            const newInserts = [];
            document.querySelectorAll('#cfg-schedule-days > div').forEach(dayRow => {
                const day = parseInt(dayRow.getAttribute('data-day'));
                const dayChecked = dayRow.querySelector('.day-master-check').checked;

                if(dayChecked) {
                    dayRow.querySelectorAll('input[data-time]:checked').forEach(timeCb => {
                        const slot = timeCb.getAttribute('data-time');
                        const max = parseInt(dayRow.querySelector(`input[data-max="${slot}"]`).value) || 1;
                        newInserts.push({ optometrist_id: optId, day_of_week: day, time_slot: slot, max_pax: max });
                    });
                }
            });

            if(newInserts.length > 0) {
                await supabase.from('schedules').insert(newInserts);
            }

            alert("此人員專屬班表已同步更新至 Supabase 雲端！");
            await syncWithSupabase();
        }

        // 🔗 狀態更新：一鍵審查狀態變更
        async function updateStatus(id, stat) {
            const { error } = await supabase.from('appointments').update({ status: stat }).eq('id', id);
            if(!error) {
                await syncWithSupabase();
            } else {
                alert("更新失敗");
            }
        }

        function saveGeneralSettings() {
            db.config.start_day = parseInt(document.getElementById('cfg-start-day').value);
            db.config.end_day = parseInt(document.getElementById('cfg-end-day').value);
            initDateLimit();
            alert("本地設定已更新！");
        }
    </script>
</body>
</html>
